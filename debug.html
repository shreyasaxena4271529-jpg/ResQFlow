<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQFlow - Debug</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        .log { margin: 5px 0; }
        .error { color: #f00; }
        .success { color: #0f0; }
    </style>
</head>
<body>
    <h1>ResQFlow Debug Console</h1>
    <div id="debug-log"></div>
    <div id="root" style="margin-top: 30px; border: 1px solid #0f0; padding: 10px;"></div>

    <script>
        const debugLog = document.getElementById('debug-log');
        
        function log(message, type = 'log') {
            const div = document.createElement('div');
            div.className = `log ${type === 'error' ? 'error' : 'success'}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugLog.appendChild(div);
            console.log(`[${type}] ${message}`);
        }

        window.onerror = (msg, url, lineNo, columnNo, error) => {
            log(`ERROR: ${msg} at ${url}:${lineNo}:${columnNo}`, 'error');
            log(`Details: ${error?.toString()}`, 'error');
            return false;
        };

        log('Page loaded', 'success');
        log('React version: ' + (React ? React.version : 'NOT LOADED'), 'success');
        log('ReactDOM available: ' + (typeof ReactDOM !== 'undefined' ? 'YES' : 'NO'), 'success');
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        log('Libraries loaded', 'success');
        log('Starting ResQFlow...', 'success');
    </script>

    <script type="text/babel" src="./ResQFlow.jsx"></script>
    
    <script>
        setTimeout(() => {
            const rootDiv = document.getElementById('root');
            if (rootDiv.children.length === 0) {
                log('ERROR: ResQFlow did not render!', 'error');
            } else {
                log('ResQFlow rendered successfully!', 'success');
            }
        }, 2000);
    </script>
</body>
</html>
